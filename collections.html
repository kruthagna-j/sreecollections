<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sree Collections - Shop</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <!-- Razorpay -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f0f0f;
      color:white;
    }

    header{
      background:#1a1a1a;
      padding:15px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:sticky;
      top:0;
      z-index:1000;
      border-bottom:1px solid #333;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
      color:#d4af37;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:20px;
      transition:0.3s;
    }

    nav a:hover{
      color:#d4af37;
    }

    .admin-link{
      color:#d4af37 !important;
    }

    .container{
      max-width:1300px;
      margin:auto;
      padding:40px 20px;
    }

    .title{
      text-align:center;
      font-size:40px;
      margin-bottom:40px;
      color:#d4af37;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:25px;
    }

    .card{
      background:#1b1b1b;
      border-radius:15px;
      overflow:hidden;
      border:1px solid #333;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
      border-color:#d4af37;
    }

    .card img{
      width:100%;
      height:300px;
      object-fit:cover;
    }

    .card-content{
      padding:20px;
    }

    .product-name{
      font-size:22px;
      margin-bottom:10px;
    }

    .price{
      color:#d4af37;
      font-size:24px;
      font-weight:bold;
      margin-bottom:15px;
    }

    .buy-btn{
      width:100%;
      padding:12px;
      background:#d4af37;
      border:none;
      color:black;
      font-weight:bold;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
    }

    .buy-btn:hover{
      background:#f0c14b;
    }

    .modal{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.8);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:2000;
    }

    .modal-content{
      background:#1b1b1b;
      padding:30px;
      border-radius:15px;
      width:90%;
      max-width:450px;
    }

    .modal-content h2{
      margin-bottom:20px;
      color:#d4af37;
    }

    .modal-content input{
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border:none;
      border-radius:8px;
      background:#2a2a2a;
      color:white;
    }

    .close-btn{
      background:red;
      color:white;
      border:none;
      padding:10px 15px;
      border-radius:6px;
      cursor:pointer;
      margin-top:10px;
    }

    .pay-btn{
      width:100%;
      padding:12px;
      background:#d4af37;
      border:none;
      color:black;
      font-weight:bold;
      border-radius:8px;
      cursor:pointer;
    }

    .loading{
      text-align:center;
      font-size:20px;
      margin-top:50px;
    }

    .error{
      text-align:center;
      color:red;
      margin-top:30px;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">Sree Collections</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="collections.html">Collections</a>
    <a href="admin-login.html" class="admin-link">Admin</a>
  </nav>
</header>

<div class="container">

  <h1 class="title">Our Collections</h1>

  <div id="loading" class="loading">
    Loading products...
  </div>

  <div id="error" class="error"></div>

  <div class="products" id="products"></div>

</div>

<!-- ORDER MODAL -->

<div class="modal" id="orderModal">
  <div class="modal-content">

    <h2>Place Order</h2>

    <input type="text" id="customerName" placeholder="Your Name">

    <input type="text" id="customerPhone" placeholder="Phone Number">

    <input type="email" id="customerEmail" placeholder="Email Address">

    <input type="number" id="quantity" placeholder="Quantity" value="1">

    <button class="pay-btn" onclick="startPayment()">
      Pay Now
    </button>

    <button class="close-btn" onclick="closeModal()">
      Cancel
    </button>

  </div>
</div>

<script>

  // EMAILJS INIT
  emailjs.init("9fGahlws55ZA4Hq9S");

  // SUPABASE
  const SUPABASE_URL = "https://peqqtfvypljvgcorddbn.supabase.co";

  const SUPABASE_KEY =
  "YOUR_SUPABASE_ANON_KEY";

  const sb = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
  );

  let selectedProduct = null;

  // LOAD PRODUCTS

  async function loadProducts(){

    try{

      const { data, error } = await sb
      .from("products")
      .select("*")
      .order("id", { ascending:false });

      document.getElementById("loading").style.display = "none";

      if(error){
        console.log(error);
        document.getElementById("error").innerHTML =
        "Failed to load products";
        return;
      }

      const productsDiv = document.getElementById("products");

      productsDiv.innerHTML = "";

      if(!data || data.length === 0){
        productsDiv.innerHTML =
        "<h2>No products added yet</h2>";
        return;
      }

      data.forEach(product => {

        productsDiv.innerHTML += `

          <div class="card">

            <img src="${product.image}" alt="">

            <div class="card-content">

              <div class="product-name">
                ${product.name}
              </div>

              <div class="price">
                ₹${product.price}
              </div>

              <button class="buy-btn"
                onclick='openOrderModal(${JSON.stringify(product)})'>
                Buy Now
              </button>

            </div>

          </div>

        `;
      });

    }catch(err){
      console.log(err);

      document.getElementById("loading").style.display = "none";

      document.getElementById("error").innerHTML =
      "Something went wrong";
    }

  }

  loadProducts();

  // OPEN MODAL

  function openOrderModal(product){

    selectedProduct = product;

    document.getElementById("orderModal").style.display = "flex";
  }

  function closeModal(){

    document.getElementById("orderModal").style.display = "none";
  }

  // PAYMENT

  function startPayment(){

    const customerName =
    document.getElementById("customerName").value;

    const customerPhone =
    document.getElementById("customerPhone").value;

    const customerEmail =
    document.getElementById("customerEmail").value;

    const quantity =
    document.getElementById("quantity").value;

    if(
      !customerName ||
      !customerPhone ||
      !customerEmail
    ){
      alert("Please fill all details");
      return;
    }

    const total =
    selectedProduct.price * quantity;

    const options = {

      key:"rzp_test_SrsY668SBTZFfn",

      amount: total * 100,

      currency:"INR",

      name:"Sree Collections",

      description:selectedProduct.name,

      image:selectedProduct.image,

      handler: async function(response){

        const orderId =
        "SC" + Date.now();

        // SAVE ORDER

        await sb.from("orders").insert([{

          order_id: orderId,

          customer_name: customerName,

          customer_phone: customerPhone,

          customer_email: customerEmail,

          product_name: selectedProduct.name,

          quantity: quantity,

          total_amount: total,

          payment_id: response.razorpay_payment_id

        }]);

        // SEND EMAIL

        emailjs.send(
          "service_fxctnxu",
          "template_detul3i",
          {

            customer_name: customerName,

            customer_email: customerEmail,

            customer_phone: customerPhone,

            order_id: orderId,

            product_name: selectedProduct.name,

            quantity: quantity,

            total_amount: "₹" + total,

            payment_method: "Razorpay"

          }

        ).then(function(){

          console.log("Email sent");

        });

        // DOWNLOAD INVOICE

        downloadInvoice(
          orderId,
          customerName,
          customerPhone,
          customerEmail,
          selectedProduct.name,
          quantity,
          total
        );

        alert(
          "Payment Successful! Invoice Downloaded."
        );

        closeModal();

      },

      prefill:{

        name:customerName,

        email:customerEmail,

        contact:customerPhone

      },

      theme:{
        color:"#d4af37"
      }

    };

    const rzp = new Razorpay(options);

    rzp.open();
  }

  // INVOICE PDF

  function downloadInvoice(
    orderId,
    customerName,
    customerPhone,
    customerEmail,
    productName,
    quantity,
    total
  ){

    const { jsPDF } = window.jspdf;

    const doc = new jsPDF();

    doc.setFontSize(22);
    doc.text("Sree Collections", 20, 20);

    doc.setFontSize(12);

    doc.text("Invoice", 20, 35);

    doc.text("Order ID: " + orderId, 20, 50);

    doc.text("Customer: " + customerName, 20, 60);

    doc.text("Phone: " + customerPhone, 20, 70);

    doc.text("Email: " + customerEmail, 20, 80);

    doc.text("Product: " + productName, 20, 100);

    doc.text("Quantity: " + quantity, 20, 110);

    doc.text("Total Amount: ₹" + total, 20, 120);

    doc.text("Payment Status: PAID", 20, 130);

    doc.text("Thank you for shopping!", 20, 150);

    doc.save(orderId + ".pdf");
  }

</script>

</body>
</html>
