<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login – Sree Collections</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--gold:#C8A96B;--dark:#0F0F0F;--charcoal:#1A1A1A;--text:#F5F0E8;--muted:#999;--border:rgba(200,169,107,0.2);--error:#e74c3c}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--text);font-family:'Manrope',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background-image:radial-gradient(ellipse at 50% 0%,rgba(200,169,107,0.06) 0%,transparent 60%)}
.login-box{background:var(--charcoal);border:1px solid var(--border);padding:3rem;width:100%;max-width:400px}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;color:var(--gold);text-align:center;margin-bottom:0.5rem}
.login-sub{text-align:center;font-size:0.8rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:2.5rem}
.form-group{margin-bottom:1.2rem}
.form-group label{display:block;font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem}
.input-wrap{position:relative}
.form-group input{width:100%;padding:0.8rem 1rem;background:var(--dark);border:1px solid var(--border);color:var(--text);font-size:0.95rem;font-family:'Manrope',sans-serif;transition:border-color 0.3s}
.form-group input:focus{outline:none;border-color:var(--gold)}
.toggle-pw{position:absolute;right:1rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.9rem}
.btn-login{width:100%;padding:0.9rem;background:var(--gold);color:var(--dark);border:none;font-size:0.9rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;font-family:'Manrope',sans-serif;transition:background 0.3s;margin-top:0.5rem}
.btn-login:hover{background:#E8C98B}
.error-msg{background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);color:var(--error);padding:0.8rem;font-size:0.85rem;margin-bottom:1rem;display:none}
.back-link{display:block;text-align:center;margin-top:1.5rem;font-size:0.8rem;color:var(--muted);text-decoration:none;transition:color 0.3s}
.back-link:hover{color:var(--gold)}
.lock-icon{text-align:center;font-size:2.5rem;color:var(--gold);margin-bottom:1.5rem;opacity:0.6}
</style>
</head>
<body>
<div class="login-box">
  <div class="lock-icon"><i class="fas fa-lock"></i></div>
  <div class="login-logo">Sree Collections</div>
  <div class="login-sub">Admin Portal — Secure Login</div>
  <div class="error-msg" id="errorMsg"><i class="fas fa-exclamation-circle"></i> Invalid username or password.</div>
  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="username">
  </div>
  <div class="form-group">
    <label>Password</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
      <button class="toggle-pw" onclick="togglePw()"><i class="fas fa-eye" id="eyeIcon"></i></button>
    </div>
  </div>
  <button class="btn-login" onclick="login()"><i class="fas fa-sign-in-alt"></i> Login</button>
  <a href="index.html" class="back-link">← Back to Store</a>
</div>

<script>
// Clear any old session on page load — force login every time
sessionStorage.removeItem('admin_auth');

function login() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  const err = document.getElementById('errorMsg');
  if (u === 'admin' && p === 'sreecollections@knl') {
    sessionStorage.setItem('admin_auth', 'true');
    window.location.href = 'admin.html';
  } else {
    err.style.display = 'block';
    document.getElementById('password').value = '';
  }
}

function togglePw() {
  const inp = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.className = 'fas fa-eye-slash';
  } else {
    inp.type = 'password';
    icon.className = 'fas fa-eye';
  }
}
</script>
</body>
</html>
